# Nginx Reverse-Proxy für Fonoster Self-Hosted
# SSL-Terminierung mit Let's Encrypt

server {
    listen 80;
    server_name app2.gofonia.de;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name app2.gofonia.de;

    ssl_certificate     /etc/letsencrypt/live/app2.gofonia.de/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app2.gofonia.de/privkey.pem;

    # Dashboard & API über Envoy
    location / {
        proxy_pass https://127.0.0.1:8449;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # gRPC-Web über Envoy
    location /fonoster {
        proxy_pass https://127.0.0.1:8449;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
