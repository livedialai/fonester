    86|  routr:
    87|    image: livedial/routr-one:2.13.22
    88|    restart: unless-stopped
    89|    labels:
    90|      - "autoheal=true"
    91|    environment:
    92|      DATABASE_URL: ${ROUTR_DATABASE_URL}
    93|      EXTERNAL_ADDRS: ${ROUTR_EXTERNAL_ADDRS}
    94|      LOGS_FORMAT: ${ROUTR_LOGS_FORMAT}
    95|      LOGS_LEVEL: ${ROUTR_LOGS_LEVEL}
    96|      LOGS_TRANSPORT: ${ROUTR_LOGS_TRANSPORT}
    97|      NATS_PUBLISHER_ENABLED: true
    98|      NATS_PUBLISHER_URL: ${ROUTR_NATS_PUBLISHER_URL}
    99|      RTPENGINE_HOST: ${ROUTR_RTPENGINE_HOST}
   100|      START_INTERNAL_DB: "false"
   101|      CONNECT_VERIFIER_PUBLIC_KEY_PATH: /etc/routr/keys/public.pem
   102|    expose:
   103|      - 51907
   104|      - 51908
   105|    ports:
   106|      - 5060:5060/udp
   107|      - 5060-5063:5060-5063
   108|    # Add this healthcheck along with the autoheal container as we are having issues with Routr crashing out.
   109|    # We will need a proper fix for this before we can remove this healthcheck.
   110|    healthcheck:
   111|      test:
   112|        [
   113|          "CMD-SHELL",
   114|          'printf "REGISTER sip:localhost SIP/2.0\r\nVia: SIP/2.0/UDP 127.0.0.1:5061;branch=z9hG4bKhealth\r\nFrom: <sip:health@localhost>;tag=1234\r\nTo: <sip:health@localhost>\r\nCall-ID: health-$$@localhost\r\nCSeq: 1 REGISTER\r\nMax-Forwards: 70\r\nContent-Type: text/plain\r\nContent-Length: 4\r\n\r\nping" | nc -u -w 1 127.0.0.1 5060 | grep -Eq "^SIP/2.0"'
   115|        ]
   116|      interval: 10s
   117|      timeout: 5s
   118|      retries: 6
   119|      start_period: 15s
   120|    volumes:
   121|      - ./config/keys/public.pem:/etc/routr/keys/public.pem
   122|
   123|  # RTPEngine uses a range of ports to handle RTP traffic. Because exposing a large range of ports 
   124|  # is not possible in Docker, we need to use network_mode: host.
   125|  #
   126|  # Unfortunately, network_mode: host is not supported for Windows or Mac.
   127|  # In those cases, we need to use a different approach.
   128|  #
   129|  # By default we are opening a small range of ports (10000-10100) to handle RTP traffic.
   130|  # However, this is not enough for production environments.
   131|  #
   132|  # We recommend that when using Linux you use network_mode: host and remove the ports section.
   133|  rtpengine:
   134|    image: livedial/rtpengine:0.3.17
   135|    restart: unless-stopped
   136|    platform: linux/x86_64
   137|    network_mode: host
   138|    environment:
   139|      PORT_MAX: ${RTPENGINE_PORT_MAX}
   140|      PORT_MIN: ${RTPENGINE_PORT_MIN}
   141|      PUBLIC_IP: ${RTPENGINE_PUBLIC_IP}
   142|
